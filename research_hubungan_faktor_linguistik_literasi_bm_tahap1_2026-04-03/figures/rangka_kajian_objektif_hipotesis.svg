<rect x="1040" y="600" width="760" height="110" rx="28" fill="#FFFFFF" stroke="#D5DDE3" stroke-width="3"/>
<rect x="1040" y="980" width="760" height="130" rx="28" fill="#FFFFFF" stroke="#D5DDE3" stroke-width="3"/>

<text x="1420" y="220" text-anchor="middle" font-family="Arial, Segoe UI, sans-serif" font-size="20" fill="#1F2933"><tspan x="1420" dy="0">H1</tspan><tspan x="1420" dy="1.35em">Hubungan kesedaran fonologi dengan keberkesanan strategi pengajaran</tspan></text>
<text x="1420" y="360" text-anchor="middle" font-family="Arial, Segoe UI, sans-serif" font-size="20" fill="#1F2933"><tspan x="1420" dy="0">H2</tspan><tspan x="1420" dy="1.35em">Hubungan kesedaran morfologi asas dengan keberkesanan strategi pengajaran</tspan></text>
<text x="1420" y="500" text-anchor="middle" font-family="Arial, Segoe UI, sans-serif" font-size="20" fill="#1F2933"><tspan x="1420" dy="0">H3</tspan><tspan x="1420" dy="1.35em">Hubungan kosa kata dan bahasa lisan dengan keberkesanan strategi pengajaran</tspan></text>
<text x="1420" y="640" text-anchor="middle" font-family="Arial, Segoe UI, sans-serif" font-size="20" fill="#1F2933"><tspan x="1420" dy="0">H4</tspan><tspan x="1420" dy="1.35em">Hubungan bahasa ibunda / bahasa rumah dengan keberkesanan strategi pengajaran</tspan></text>
<text x="1420" y="1025" text-anchor="middle" font-family="Arial, Segoe UI, sans-serif" font-size="20" fill="#1F2933"><tspan x="1420" dy="0">H5</tspan><tspan x="1420" dy="1.35em">Faktor linguistik tertentu merupakan peramal signifikan</tspan><tspan x="1420" dy="1.25em">terhadap keberkesanan strategi pengajaran</tspan></text>

