<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1280" viewBox="0 0 1920 1280">
<rect width="1920" height="1280" fill="#F8F6F1"/>
<rect x="0" y="0" width="1920" height="110" fill="#104D64"/>
<text x="70" y="65" font-family="Arial, Segoe UI, sans-serif" font-size="42" font-weight="700" fill="#FFFFFF">Rangka Kajian: Kaitan antara Objektif Kajian dan Hipotesis Kajian</text>
<text x="72" y="96" font-family="Arial, Segoe UI, sans-serif" font-size="22" fill="#D8E5EA">Hubungan aliran objektif deskriptif, objektif inferensi, dan hipotesis yang diuji dalam kajian</text>

<rect x="110" y="180" width="730" height="120" rx="28" fill="#1F7A8C"/>
<rect x="110" y="335" width="730" height="120" rx="28" fill="#1F7A8C"/>
<rect x="110" y="520" width="730" height="150" rx="28" fill="#D9A441"/>
<rect x="110" y="1020" width="730" height="120" rx="28" fill="#5A9466"/>
<rect x="110" y="1170" width="730" height="90" rx="28" fill="#104D64"/>

<text x="475" y="225" text-anchor="middle" font-family="Arial, Segoe UI, sans-serif" font-size="24" font-weight="700" fill="#FFFFFF"><tspan x="475" dy="0">Objektif 1</tspan><tspan x="475" dy="1.35em">Mengenal pasti tahap faktor linguistik utama murid Tahap 1</tspan></text>
<text x="475" y="380" text-anchor="middle" font-family="Arial, Segoe UI, sans-serif" font-size="24" font-weight="700" fill="#FFFFFF"><tspan x="475" dy="0">Objektif 2</tspan><tspan x="475" dy="1.35em">Mengenal pasti strategi pengajaran literasi Bahasa Melayu yang digunakan guru</tspan></text>
<text x="475" y="570" text-anchor="middle" font-family="Arial, Segoe UI, sans-serif" font-size="24" font-weight="700" fill="#FFFFFF"><tspan x="475" dy="0">Objektif 3</tspan><tspan x="475" dy="1.35em">Menentukan hubungan antara faktor linguistik murid</tspan><tspan x="475" dy="1.25em">dengan keberkesanan strategi pengajaran</tspan></text>
<text x="475" y="1065" text-anchor="middle" font-family="Arial, Segoe UI, sans-serif" font-size="24" font-weight="700" fill="#FFFFFF"><tspan x="475" dy="0">Objektif 4</tspan><tspan x="475" dy="1.35em">Mengenal pasti faktor linguistik yang paling dominan meramal keberkesanan strategi pengajaran</tspan></text>
<text x="475" y="1205" text-anchor="middle" font-family="Arial, Segoe UI, sans-serif" font-size="22" font-weight="700" fill="#FFFFFF"><tspan x="475" dy="0">Objektif 5</tspan><tspan x="475" dy="1.3em">Meneroka penyesuaian strategi guru berdasarkan profil linguistik murid</tspan></text>

<rect x="1040" y="180" width="760" height="110" rx="28" fill="#FFFFFF" stroke="#D5DDE3" stroke-width="3"/>
<rect x="1040" y="320" width="760" height="110" rx="28" fill="#FFFFFF" stroke="#D5DDE3" stroke-width="3"/>
