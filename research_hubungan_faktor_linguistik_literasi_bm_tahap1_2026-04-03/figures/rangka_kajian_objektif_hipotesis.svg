<text x="1179" y="158" text-anchor="middle" font-family="Arial, Segoe UI, sans-serif" font-size="18" fill="#FFFFFF">Bahagian Hipotesis Kajian</text>

<text x="110" y="1230" font-family="Arial, Segoe UI, sans-serif" font-size="18" fill="#5D6C7A">O1 dan O2 bersifat deskriptif. O3 diuji melalui H1-H4. O4 diuji melalui H5. O5 melengkapkan dapatan secara kualitatif.</text>
